name: Build ESP32 Smart Home Binary

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install Dependencies
        run: |
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core install esp32:esp32@2.0.17 --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli lib install "ArduinoJson"
          git clone --depth 1 https://github.com/schreibfaul1/ESP32-audioI2S /home/runner/Arduino/libraries/ESP32-audioI2S

      - name: Compile
        run: |
          # फाईल शोधून तिचे फोल्डर मिळवणे
          FILE_PATH=$(find . -name "SmartHome.ino" | head -n 1)
          SKETCH_DIR=$(dirname "$FILE_PATH")
          echo "Compiling sketch in directory: $SKETCH_DIR"
          arduino-cli compile --fqbn esp32:esp32:esp32 "$SKETCH_DIR" --output-dir build --libraries /home/runner/Arduino/libraries

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ESP32-Smart-Hub-Firmware
          path: build/*.bin
          
