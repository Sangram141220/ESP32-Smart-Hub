name: Build ESP32 Smart Home

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 Core
        run: |
          arduino-cli config init
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core install esp32:esp32@3.3.0 --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Install Libraries
        run: |
          mkdir -p ~/Arduino/libraries
          arduino-cli lib install "ArduinoJson"
          git clone --depth 1 https://github.com/schreibfaul1/ESP32-audioI2S.git ~/Arduino/libraries/ESP32-audioI2S

      - name: Verify Sketch
        run: |
          ls -la
          find . -name "*.ino"

      - name: Compile Sketch
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            . \
            --libraries ~/Arduino/libraries \
            --output-dir build

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: ESP32-Smart-Hub-Firmware
          path: build/*.bin
